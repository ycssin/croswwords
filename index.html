<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>لوحة كلمات متقاطعة 15×15</title>
	<style>
		:root {
			--cell-size: 42px;
			--line-color: #1f1f1f;
			--cell-bg: #f7f7f7;
			--block-bg: #121212;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			background: #f3f0ef;
			font-family: "Segoe UI", Tahoma, Arial, sans-serif;
		}

		.board-wrap {
			padding: 16px;
			background: #ffffff;
			border: 1px solid #d8d8d8;
			box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
			overflow: auto;
			max-width: 100vw;
		}

		.board {
			direction: ltr;
			display: grid;
			grid-template-columns: 34px repeat(15, var(--cell-size));
			grid-template-rows: 34px repeat(15, var(--cell-size));
			border: 1px solid var(--line-color);
			width: fit-content;
			background: var(--line-color);
			gap: 1px;
		}

		.label,
		.corner {
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 13px;
			font-weight: 600;
			color: #333;
			background: #fafafa;
			user-select: none;
		}

		.cell,
		.block {
			width: var(--cell-size);
			height: var(--cell-size);
			border: none;
			background: var(--cell-bg);
		}

		.cell {
			text-align: center;
			font-size: 24px;
			font-weight: 700;
			color: #111;
			outline: none;
			caret-color: #111;
			direction: rtl;
		}

		.cell:focus {
			background: #ececec;
		}

		.block {
			background: var(--block-bg);
			pointer-events: none;
		}
	</style>
</head>
<body>
	<div class="board-wrap">
		<div id="board" class="board" aria-label="لوحة 15 في 15"></div>
	</div>

	<script>
		const size = 15;

		const blocked = new Set([
			"1-4",
			"2-4", "2-7",
			"3-6",
			"4-2", "4-10", "4-13", "4-14",
			"5-5", "5-8", "5-12",
			"6-3", "6-15",
			"7-1",
			"8-7", "8-11",
			"9-4", "9-6", "9-10",
			"10-1", "10-8", "10-12", "10-13",
			"11-2",
			"12-5", "12-8",
			"13-1", "13-10",
			"14-3", "14-6", "14-9", "14-15",
			"15-1", "15-12"
		]);

		const board = document.getElementById("board");

		const moveByArrow = (fromRow, fromCol, rowStep, colStep) => {
			let targetRow = fromRow + rowStep;
			let targetCol = fromCol + colStep;

			while (targetRow >= 1 && targetRow <= size && targetCol >= 1 && targetCol <= size) {
				if (!blocked.has(`${targetRow}-${targetCol}`)) {
					const nextCell = board.querySelector(`.cell[data-row="${targetRow}"][data-col="${targetCol}"]`);
					if (nextCell) {
						nextCell.focus();
						nextCell.select();
					}
					return;
				}

				targetRow += rowStep;
				targetCol += colStep;
			}
		};

		const corner = document.createElement("div");
		corner.className = "corner";
		corner.textContent = "#";
		board.appendChild(corner);

		for (let col = size; col >= 1; col--) {
			const label = document.createElement("div");
			label.className = "label";
			label.textContent = col;
			board.appendChild(label);
		}

		for (let row = 1; row <= size; row++) {
			const rowLabel = document.createElement("div");
			rowLabel.className = "label";
			rowLabel.textContent = row;
			board.appendChild(rowLabel);

			for (let col = 1; col <= size; col++) {
				const key = `${row}-${col}`;

				if (blocked.has(key)) {
					const block = document.createElement("div");
					block.className = "block";
					block.setAttribute("aria-hidden", "true");
					board.appendChild(block);
					continue;
				}

				const input = document.createElement("input");
				input.className = "cell";
				input.type = "text";
				input.maxLength = 1;
				input.inputMode = "text";
				input.autocomplete = "off";
				input.spellcheck = false;
				input.dataset.row = row;
				input.dataset.col = col;
				input.setAttribute("aria-label", `خانة الصف ${row} العمود ${col}`);

				input.addEventListener("input", (event) => {
					const value = event.target.value;
					const arabicChars = [...value].filter((ch) => /[\u0600-\u06FF]/.test(ch));
					event.target.value = arabicChars.length ? arabicChars[arabicChars.length - 1] : "";
				});

				input.addEventListener("keydown", (event) => {
					const rowPos = Number(event.currentTarget.dataset.row);
					const colPos = Number(event.currentTarget.dataset.col);

					if (event.key === "ArrowUp") {
						event.preventDefault();
						moveByArrow(rowPos, colPos, -1, 0);
					}

					if (event.key === "ArrowDown") {
						event.preventDefault();
						moveByArrow(rowPos, colPos, 1, 0);
					}

					if (event.key === "ArrowLeft") {
						event.preventDefault();
						moveByArrow(rowPos, colPos, 0, -1);
					}

					if (event.key === "ArrowRight") {
						event.preventDefault();
						moveByArrow(rowPos, colPos, 0, 1);
					}
				});

				board.appendChild(input);
			}
		}
	</script>
</body>
</html>
